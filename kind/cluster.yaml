kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: istio-security
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
    extraMounts:
      - hostPath: ./data/postgres
        containerPath: /mnt/postgres-data
