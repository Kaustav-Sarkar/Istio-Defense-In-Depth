apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: zt-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: auth-service-sa
      containers:
        - name: auth-service
          image: local/auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak.zt-identity.svc.cluster.local:8080"
            - name: KEYCLOAK_PUBLIC_URL
              value: "https://idp.localtest.me"
            - name: KEYCLOAK_REALM
              value: "istio-security-poc"
            - name: KEYCLOAK_CLIENT_ID
              value: "auth-service"
            - name: KEYCLOAK_ISSUER
              value: "https://idp.localtest.me/realms/istio-security-poc"
            - name: KEYCLOAK_TLS_VERIFY
              value: "false" # In a real environment, we'd verify TLS
            - name: VAULT_URL
              value: "http://vault.zt-security.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-auth-token
                  key: token
            - name: APP_PUBLIC_URL
              value: "https://app.localtest.me"
            - name: OIDC_HTTP_TIMEOUT_SECONDS
              value: "5.0"
            - name: VAULT_HTTP_TIMEOUT_SECONDS
              value: "5.0"
          envFrom:
            - secretRef:
                name: auth-service-credentials
